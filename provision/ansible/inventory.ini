# Each line = one AgentOS box you manage from this laptop.
# Replace IP / user. SSH key auth assumed (ssh-copy-id first).
[agentos]
agentbox ansible_host=192.168.1.50 ansible_user=agent

[agentos:vars]
# Override any common.sh knob here and it flows into provisioning.
agentos_local_model=hermes3:8b
